<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — RistoCloud</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Outfit',sans-serif;
  background:#08080a;
  color:#e8e8f0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.login-card{
  background:#111118;
  border:1.5px solid #252530;
  border-radius:24px;
  padding:48px 40px;
  width:90%;
  max-width:380px;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.brand{font-size:42px;font-weight:900;color:#fff;line-height:1}
.brand span{color:#f59e0b}
.sub{font-size:14px;color:#505068;margin-bottom:36px}
.sub span{color:#f59e0b;font-weight:600}
h1{font-size:28px;font-weight:700;color:#fff;align-self:flex-start;margin-bottom:28px}
label{
  font-size:11px;color:#505068;text-transform:uppercase;
  letter-spacing:1.5px;font-weight:600;align-self:flex-start;margin-bottom:8px;
}
input{
  width:100%;height:52px;border-radius:12px;
  border:2px solid #333;background:#08080a;
  color:#fff;font-size:16px;font-family:'Outfit',sans-serif;
  padding:0 18px;margin-bottom:18px;outline:none;
}
input:focus{border-color:#f59e0b}
button{
  width:100%;height:56px;border-radius:14px;border:none;
  background:#f59e0b;color:#000;font-size:20px;font-weight:700;
  font-family:'Outfit',sans-serif;margin-top:12px;cursor:pointer;
}
button:hover{background:#d97706}
.link{font-size:14px;color:#f59e0b;margin-top:24px;font-weight:500;text-decoration:none}
.link:hover{text-decoration:underline}
</style>
</head>
<body>
  <div class="login-card">
    <div class="brand">Risto<span>Cloud</span></div>
    <div class="sub">un prodotto <span>Nodo Italia</span></div>
    <h1>Accedi</h1>
    <label for="email">Email</label>
    <input type="email" id="email" value="mario@ristorante.it">
    <label for="password">Password</label>
    <input type="password" id="password" value="password1">
    <button type="submit">Accedi</button>
    <a href="#" class="link">Nuovo Ristorante →</a>
  </div>
</body>
</html>
