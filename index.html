  } else if (e < dur + hold) {
    bright.style.maskImage = 'none';
    bright.style.webkitMaskImage = 'none';
    bright.style.opacity = 1;
  } else {
    const p = (e - dur - hold) / fade;
    bright.style.maskImage = 'none';
    bright.style.webkitMaskImage = 'none';
    bright.style.opacity = 1 - p;
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
