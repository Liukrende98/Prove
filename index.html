<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nodo Italia</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Outfit',sans-serif;
  background:#08080a;
  color:#e8e8f0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.logo-wrap{margin-bottom:32px}
.brand{font-size:48px;font-weight:900;color:#fff;text-align:center;line-height:1}
.brand span{color:#f59e0b}
.sub{font-size:14px;color:#505068;text-align:center;margin-bottom:48px}
.servizi{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;max-width:600px}
.servizio{
  background:#111118;border:1.5px solid #252530;border-radius:16px;
  padding:32px 28px;width:260px;text-align:center;
  text-decoration:none;color:inherit;
  transition:all .25s cubic-bezier(.4,0,.2,1);
  cursor:pointer;
}
.servizio:hover{border-color:#f59e0b;transform:translateY(-4px);box-shadow:0 8px 32px rgba(245,158,11,.1)}
.servizio .icona{font-size:36px;margin-bottom:12px}
.servizio .nome{font-size:18px;font-weight:700;color:#fff;margin-bottom:6px}
.servizio .desc{font-size:13px;color:#505068;line-height:1.5}
.servizio .badge{
  display:inline-block;margin-top:12px;padding:4px 12px;
  border-radius:20px;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:1px;
}
.badge-attivo{background:#081a0e;color:#22c55e;border:1px solid rgba(34,197,94,.3)}
.badge-presto{background:#1a1508;color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.footer{margin-top:48px;font-size:11px;color:#333;text-align:center}
</style>
</head>
<body>

  <!-- Logo NODO -->
  <div class="logo-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="380 520 1060 760" preserveAspectRatio="xMidYMid meet" style="width:80px;height:58px;filter:drop-shadow(0 0 14px rgba(245,158,11,.3))"><g transform="translate(0,1800) scale(1,-1)"><path fill="#f59e0b" fill-rule="evenodd" d="M1023 1120 c160 -49 277 -174 277 -295 0 -63 -20 -105 -69 -147 -54 -46 -117 -64 -211 -59 -94 5 -146 5 -240 0 -94 -5 -157 13 -211 59 -118 102 -84 270 78 378 122 81 250 103 376 64z M805 1025 c-82 -29 -101 -98 -49 -177 24 -38 117 -108 143 -108 26 0 113 63 142 103 33 46 39 108 14 144 -32 46 -170 66 -250 38z M605 865 c-17 -43 -17 -49 -2 -80 18 -38 53 -60 112 -70 l40 -7 -43 44 c-24 25 -53 71 -66 102 l-24 58 -17 -47z M1157 859 c-11 -31 -38 -72 -65 -102 l-47 -50 40 7 c57 11 92 32 110 66 19 36 19 46 -3 93 l-17 38 -18 -52z"/></g></svg>
  </div>

  <div class="brand">Nodo <span>Italia</span></div>
  <div class="sub">I nostri servizi</div>

  <div class="servizi">
    <a href="login.html" class="servizio">
      <div class="icona">🍽️</div>
      <div class="nome">RistoCloud</div>
      <div class="desc">Gestionale completo per ristoranti. Cassa, sala, cucine, menu e statistiche.</div>
      <div class="badge badge-attivo">Attivo</div>
    </a>
    <div class="servizio" style="cursor:default;opacity:.5">
      <div class="icona">📦</div>
      <div class="nome">Prossimamente</div>
      <div class="desc">Nuovi servizi in arrivo dalla famiglia Nodo Italia.</div>
      <div class="badge badge-presto">In sviluppo</div>
    </div>
  </div>

  <div class="footer">© 2026 Nodo Italia — www.nodo-italia.it</div>

</body>
</html>
